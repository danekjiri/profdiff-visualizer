name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: '21'

      - name: Install Profdiff JAR dependencies
        run: |
          chmod +x resources/scripts_benchmarks/mvn_install_file.sh
          ./resources/scripts_benchmarks/mvn_install_file.sh resources/profdiff-dependency-jars

      - name: Run backend tests
        run: cd backend && mvn verify

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/profdiff-web-application/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/profdiff-web-application

      - name: Run tests
        run: npm run test -- --ci --colors
        working-directory: frontend/profdiff-web-application

  frontend-build:
    runs-on: ubuntu-latest
    needs: frontend-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/profdiff-web-application/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/profdiff-web-application

      - name: Build
        run: npm run build
        working-directory: frontend/profdiff-web-application
